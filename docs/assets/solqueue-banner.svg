<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#050510"/>
      <stop offset="100%" stop-color="#0a0a1f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="400" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9945FF"/>
      <stop offset="100%" stop-color="#14F195"/>
    </linearGradient>
    <linearGradient id="glow" x1="200" y1="0" x2="600" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9945FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#14F195" stop-opacity="0.05"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Glow -->
  <ellipse cx="400" cy="100" rx="300" ry="120" fill="url(#glow)"/>

  <!-- Grid pattern -->
  <g stroke="rgba(153, 69, 255, 0.06)" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Floating cubes -->
  <g opacity="0.3">
    <rect x="80" y="30" width="25" height="25" rx="4" stroke="#9945FF" stroke-width="1.5" fill="none" transform="rotate(15 92 42)"/>
    <rect x="680" y="40" width="20" height="20" rx="3" stroke="#14F195" stroke-width="1.5" fill="none" transform="rotate(-20 690 50)"/>
    <rect x="150" y="140" width="18" height="18" rx="3" stroke="#00D4AA" stroke-width="1.5" fill="none" transform="rotate(30 159 149)"/>
    <rect x="620" y="130" width="22" height="22" rx="3" stroke="#9945FF" stroke-width="1.5" fill="none" transform="rotate(-10 631 141)"/>
    <rect x="720" y="150" width="15" height="15" rx="2" stroke="#14F195" stroke-width="1" fill="none" transform="rotate(45 727 157)"/>
  </g>

  <!-- Particles -->
  <g opacity="0.5">
    <circle cx="120" cy="80" r="2" fill="#9945FF"/>
    <circle cx="250" cy="50" r="1.5" fill="#14F195"/>
    <circle cx="380" cy="160" r="1" fill="#00D4AA"/>
    <circle cx="550" cy="30" r="2" fill="#9945FF"/>
    <circle cx="650" cy="100" r="1.5" fill="#14F195"/>
    <circle cx="750" cy="60" r="1" fill="#00D4AA"/>
    <circle cx="450" cy="45" r="1" fill="#9945FF"/>
  </g>

  <!-- Logo Icon -->
  <rect x="270" y="55" width="44" height="44" rx="10" fill="url(#accent)"/>
  <text x="292" y="86" font-family="Arial" font-size="22" fill="#050510" font-weight="bold" text-anchor="middle">◈</text>

  <!-- Title -->
  <text x="330" y="88" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="bold" fill="white">SolQueue</text>

  <!-- Subtitle -->
  <text x="292" y="120" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="rgba(255,255,255,0.5)">On-Chain Job Queue System — Built on Solana</text>

  <!-- Badges -->
  <g transform="translate(292, 140)">
    <rect width="60" height="22" rx="11" fill="rgba(153, 69, 255, 0.2)" stroke="rgba(153, 69, 255, 0.4)" stroke-width="0.5"/>
    <text x="30" y="15" font-family="monospace" font-size="9" fill="#b06aff" text-anchor="middle">Solana</text>

    <rect x="70" width="50" height="22" rx="11" fill="rgba(20, 241, 149, 0.2)" stroke="rgba(20, 241, 149, 0.4)" stroke-width="0.5"/>
    <text x="95" y="15" font-family="monospace" font-size="9" fill="#14F195" text-anchor="middle">Rust</text>

    <rect x="130" width="60" height="22" rx="11" fill="rgba(0, 212, 170, 0.2)" stroke="rgba(0, 212, 170, 0.4)" stroke-width="0.5"/>
    <text x="160" y="15" font-family="monospace" font-size="9" fill="#00D4AA" text-anchor="middle">Anchor</text>
  </g>

  <!-- Top accent line -->
  <rect x="0" y="0" width="800" height="3" rx="1.5" fill="url(#accent)"/>
</svg>
